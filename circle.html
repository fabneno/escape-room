<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triangle Lock</title>

<style>
body {
  background-color: black;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 40px 20px;
}

img {
  width: 120px;
  margin-bottom: 30px;
}

input {
  font-size: 20px;
  padding: 10px;
  width: 80%;
  max-width: 300px;
  text-align: center;
}

button {
  margin-top: 20px;
  font-size: 18px;
  padding: 10px 20px;
  background-color: crimson;
  color: white;
  border: none;
  border-radius: 8px;
}

#result {
  margin-top: 25px;
  font-size: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<img src="circle.png">

<br>

<input type="text" id="codeInput" placeholder="Enter code">
<br>
<button onclick="checkCode()">Unlock</button>
<br>
<button onclick="goBack()">⬅ Return</button>

<div id="result"></div>

<script>
function checkCode() {
  var correctCode = "presunto";  // CHANGE THIS
  var userInput = document.getElementById("codeInput").value.trim();

  if (userInput === correctCode) {
    localStorage.setItem("circle", "solved");

    document.getElementById("result").innerHTML = "Unlocked!";
    document.getElementById("result").style.color = "lime";

    setTimeout(() => {
      window.location.href = "index.html";
    }, 1500);

  } else {
    document.getElementById("result").innerHTML = "Wrong code!";
    document.getElementById("result").style.color = "red";
  }
}
function goBack() {
  window.location.href = "index.html";
}  
</script>

</body>
</html>
