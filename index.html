<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escape Control Panel</title>

<style>
body {
  background-color: #111;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 30px 15px;
}

h1 {
  margin-bottom: 30px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  max-width: 400px;
  margin: auto;
}

.symbol {
  padding: 20px;
  background: #222;
  border-radius: 15px;
}

.symbol img {
  width: 80px;
}

.green {
  filter: hue-rotate(100deg) saturate(4);
}
</style>
</head>

<body>

<h1>Select a Symbol</h1>

<div class="grid">
  <a href="triangle.html" class="symbol"><img id="triangle" src="triangle.png"></a>
  <a href="square.html" class="symbol"><img id="square" src="square.png"></a>
  <a href="heart.html" class="symbol"><img id="heart" src="heart.png"></a>
  <a href="circle.html" class="symbol"><img id="circle" src="circle.png"></a>
  <a href="star.html" class="symbol"><img id="star" src="star.png"></a>
  <a href="moon.html" class="symbol"><img id="moon" src="moon.png"></a>
  <a href="diamond.html" class="symbol"><img id="diamond" src="diamond.png"></a>
  <a href="cross.html" class="symbol"><img id="cross" src="cross.png"></a>
</div>

<script>
const symbols = ["triangle","square","heart","circle","star","moon","diamond","cross"];

let solvedCount = 0;

symbols.forEach(symbol => {
  if(localStorage.getItem(symbol) === "solved") {
    document.getElementById(symbol).classList.add("green");
    solvedCount++;
  }
});

if(solvedCount === 8) {
  setTimeout(() => {
    window.location.href = "final.html";
  }, 1000);
}
</script>

</body>
</html>
