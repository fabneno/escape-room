<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escape Room Control Panel</title>

<style>
body {
  background-color: #111;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 30px 15px;
}

h1 {
  margin-bottom: 30px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  max-width: 400px;
  margin: auto;
}

.symbol {
  font-size: 50px;
  padding: 25px;
  background: #222;
  border-radius: 15px;
  text-decoration: none;
  color: white;
}

.symbol:active {
  background: crimson;
}
</style>
</head>

<body>

<h1>Select a Symbol</h1>

<div class="grid">
  <a href="triangle.html" class="symbol">🔺</a>
  <a href="square.html" class="symbol">🟥</a>
  <a href="heart.html" class="symbol">❤️</a>
  <a href="circle.html" class="symbol">⚪</a>
  <a href="star.html" class="symbol">⭐</a>
  <a href="moon.html" class="symbol">🌙</a>
  <a href="diamond.html" class="symbol">💎</a>
  <a href="cross.html" class="symbol">❌</a>
</div>

</body>
</html>
